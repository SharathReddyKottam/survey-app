apiVersion: apps/v1
kind: Deployment
metadata:
  name: survey-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: survey
  template:
    metadata:
      labels:
        app: survey
    spec:
      containers:
        - name: survey-app
          image: gcr.io/project1-453304/survey-app:latest
          ports:
            - containerPort: 5000
  ```

---

### What every single line does:

**`apiVersion: apps/v1`**
  - Tells Kubernetes which version of the API to use
  - Think of it like telling Kubernetes "use this rulebook version"

**`kind: Deployment`**
  - Tells Kubernetes what type of object we are creating
  - A Deployment manages running containers and keeps them alive
  - Other kinds exist like Service, Pod, ConfigMap etc.

**`metadata: name: survey-app`**
- The name of our deployment
- Used to identify it when running kubectl commands
- Like giving our deployment an ID

**`spec: replicas: 3`**
- Run **3 copies** of our container simultaneously
- If one crashes Kubernetes automatically starts a new one
- If one is busy others handle the traffic
- This is what makes our app **highly available**

**`selector: matchLabels: app: survey`**
- Tells the Deployment which Pods to manage
- It looks for Pods with the label `app: survey`
- Labels are like name tags on containers

**`template: metadata: labels: app: survey`**
- Every Pod created by this Deployment gets the label `app: survey`
- This is how the Deployment finds and manages its Pods

**`containers: name: survey-app`**
- Name of the container inside the Pod

**`image: gcr.io/project1-453304/survey-app:latest`**
  - Which Docker image to run
  - `gcr.io` = Google Container Registry
  - `project1-453304` = our GCP project ID
  - `survey-app` = our image name
  - `:latest` = use the latest version

**`ports: containerPort: 5000`**
- Our Flask app runs on port 5000
- Tells Kubernetes which port to use inside the container

---

### Simple Way To Think About It:
  ```
deployment.yaml says:
  "Hey Kubernetes — 
 run 3 copies of our survey-app container
 using the image from Google Container Registry
 on port 5000
 and keep them running forever"
  ```

---

